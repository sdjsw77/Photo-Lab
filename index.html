        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
            -webkit-font-smoothing: antialiased;
        }

        /* Mobile Touch Improvements */
        * {
            -webkit-tap-highlight-color: transparent; /* Remove default tap highlight */
        }
        
        /* Active states for better touch feedback */
        button:active, .glass-card.cursor-pointer:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* Safe Area Utilities */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .slider-track {
            position: relative;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        .slider-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        /* Animation */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass & Gradient Utilities */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-gradient-blue {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-cyan {
            background: linear-gradient(to right, #22d3ee, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-pink {
            background: linear-gradient(to right, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-gold {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-orange {
            background: linear-gradient(to right, #fb923c, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-teal {
            background: linear-gradient(to right, #2dd4bf, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-indigo {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-silver {
            background: linear-gradient(to right, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Custom Range Slider for Practice Page - Mobile Optimized */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 24px; /* Increased touch area */
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; /* Larger thumb for mobile */
            width: 20px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            margin-top: -8px; /* Centering adjusted for new height */
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
            border: 2px solid #fff; /* Easier to see */
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #475569;
            border-radius: 2px;
        }
        /* Color input range tracks */
        #p-exposure::-webkit-slider-thumb { background: #60a5fa; }
        #p-contrast::-webkit-slider-thumb { background: #a78bfa; }
        #p-highlights::-webkit-slider-thumb { background: #f472b6; }
        #p-shadows::-webkit-slider-thumb { background: #818cf8; }
        #p-texture::-webkit-slider-thumb { background: #34d399; }
        #p-clarity::-webkit-slider-thumb { background: #2dd4bf; }
        #p-dehaze::-webkit-slider-thumb { background: #fbbf24; }
        #p-vibrance::-webkit-slider-thumb { background: #f87171; }
        #p-saturation::-webkit-slider-thumb { background: #f472b6; }
        
        /* Remove number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            font-size: 16px; /* Prevent iOS zoom */
        }
        /* Prevent iOS zoom on inputs */
        input[type="text"] {
            font-size: 16px;
        }

        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            bottom: calc(30px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: max-content;
            max-width: 90%;
        }
        .toast {
            background: rgba(220, 38, 38, 0.95); /* Red warning */
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

                                내보내기 시 가로 픽셀을 <strong>1080px</strong>로 고정하세요. 더 큰 해상도로 올리면 인스타그램 자체 알고리즘이 오히려 화질을 뭉개버릴 수 있습니다.
                            </p>
                        </div>
                    </div>
                </div>
            `
        };

        // --- Helper Function for Toast ---
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => { if (toast.parentElement) toast.parentElement.removeChild(toast); }, 300);
            }, 2500);
        }

        // --- Practice Simulator Logic (Revised) ---
        function updateNumberFromSlider(id) {
            const slider = document.getElementById(`p-${id}`);
            const numberInput = document.getElementById(`num-${id}`);
            if (slider && numberInput) {
                numberInput.value = slider.value;
                updateImage();
            }
        }

        function updateSliderFromNumber(id) {
            const slider = document.getElementById(`p-${id}`);
            const numberInput = document.getElementById(`num-${id}`);
            if (slider && numberInput) {
                let val = parseInt(numberInput.value);
                const min = parseInt(numberInput.min);
                const max = parseInt(numberInput.max);
                if (isNaN(val)) val = 0;
                if (val < min) { val = min; showToast(`입력 가능한 최소값은 ${min}입니다.`); numberInput.value = min; } 
                else if (val > max) { val = max; showToast(`입력 가능한 최대값은 ${max}입니다.`); numberInput.value = max; }
                slider.value = val;
                updateImage();
            }
        }

        function updateImage() {
            const img = document.getElementById('practice-image');
            if (!img) return;
            const exposure = parseInt(document.getElementById('p-exposure').value);
            const contrast = parseInt(document.getElementById('p-contrast').value);
            const highlights = parseInt(document.getElementById('p-highlights').value);
            const shadows = parseInt(document.getElementById('p-shadows').value);
            const texture = parseInt(document.getElementById('p-texture').value);
            const clarity = parseInt(document.getElementById('p-clarity').value);
            const dehaze = parseInt(document.getElementById('p-dehaze').value);
            const vibrance = parseInt(document.getElementById('p-vibrance').value);
            const saturation = parseInt(document.getElementById('p-saturation').value);

            let brightnessVal = 100 + (exposure * 1.5) + (shadows * 0.4) + (highlights * 0.1) - (dehaze * 0.2);
            let contrastVal = 100 + contrast + (clarity * 0.6) + (dehaze * 0.5) + (texture * 0.2) + (highlights * 0.1) - (shadows * 0.1);
            let saturateVal = 100 + saturation + (vibrance * 0.8) + (dehaze * 0.4);

            img.style.filter = `brightness(${brightnessVal}%) contrast(${contrastVal}%) saturate(${saturateVal}%)`;
        }

        function resetSliders() {
            const ids = ['exposure', 'contrast', 'highlights', 'shadows', 'texture', 'clarity', 'dehaze', 'vibrance', 'saturation'];
            ids.forEach(id => {
                const slider = document.getElementById(`p-${id}`);
                const number = document.getElementById(`num-${id}`);
                if(slider && number) { slider.value = 0; number.value = 0; }
            });
            updateImage();
        }

        function createSlider(label, rangeText, percent, colorBase) {
            const colorMap = { 'blue': 'from-blue-500 to-cyan-400', 'green': 'from-emerald-500 to-teal-400', 'purple': 'from-purple-500 to-violet-400', 'pink': 'from-pink-500 to-rose-400', 'red': 'from-red-500 to-orange-400' };
            const shadowMap = { 'blue': 'shadow-blue-500/50', 'green': 'shadow-emerald-500/50', 'purple': 'shadow-purple-500/50', 'pink': 'shadow-pink-500/50', 'red': 'shadow-red-500/50' };
            const gradientClass = colorMap[colorBase] || 'from-blue-500 to-cyan-400';
            const shadowClass = shadowMap[colorBase] || 'shadow-blue-500/50';
            return `<div class="mb-6"><div class="flex justify-between items-end mb-2"><span class="text-sm font-medium text-slate-300">${label}</span><span class="text-xs text-slate-400 font-mono bg-slate-800/80 px-2 py-0.5 rounded border border-slate-700">${rangeText}</span></div><div class="slider-track bg-slate-700/50"><div class="slider-fill bg-gradient-to-r ${gradientClass}" style="width: ${percent}%;"></div><div class="slider-thumb ${shadowClass}" style="left: ${percent}%;"></div></div></div>`;
        }

        let lastActivePageId = 'home';
        function router(pageId) {
            lastActivePageId = pageId; 
            const mainContent = document.getElementById('main-content');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(10px)';
            mainContent.style.transition = 'opacity 0.2s ease-out, transform 0.2s ease-out';
            setTimeout(() => {
                mainContent.innerHTML = contentData[pageId] || contentData['home'];
                mainContent.scrollTop = 0;
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
                updateActiveNav(pageId);
                closeSidebar();
            }, 200);
        }

        function updateActiveNav(activeId) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.classList.remove('bg-slate-800/50', 'text-blue-400', 'font-medium', 'border', 'border-slate-700/50');
                item.classList.add('text-slate-400', 'border-transparent');
                if (item.getAttribute('onclick').includes(`'${activeId}'`)) {
                    item.classList.add('bg-slate-800/50', 'text-blue-400', 'font-medium', 'border', 'border-slate-700/50');
                    item.classList.remove('text-slate-400', 'border-transparent');
                }
            });
        }

        const pageTitles = { home: "홈 / 개요", photography: "실전 촬영 가이드", golden_triangle: "골든 트라이앵글 심화", frame_composition: "액자 구도 심화", workflow: "핵심 보정 흐름", landscape: "풍경 사진 레시피", portrait: "인물 사진 레시피", concepts: "JPG vs RAW & 용어", web_master: "가이드 메뉴", film_recipe: "필름 감성 레시피", bw_master: "흑백 사진 마스터", cinematic: "시네마틱 컬러", practice: "실시간 보정 연습", instagram_tips: "인스타 업로드 팁" };

        function stripHtml(html) { let tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; }
        const searchIndex = Object.keys(contentData).map(key => ({ id: key, title: pageTitles[key] || "기타", content: stripHtml(contentData[key]).toLowerCase() }));

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            const mainContent = document.getElementById('main-content');
            if (!query) { router(lastActivePageId); return; }
            const results = searchIndex.filter(item => item.title.toLowerCase().includes(query) || item.content.includes(query));
            let resultsHtml = `<div class="max-w-4xl mx-auto p-6 md:p-10 fade-in"><h2 class="text-2xl font-bold mb-6 text-white flex items-center gap-2"><svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>검색 결과: "${e.target.value}"</h2>`;
            if (results.length === 0) { resultsHtml += `<div class="text-center py-12 text-slate-500"><p class="text-lg">검색 결과가 없습니다.</p><p class="text-sm mt-2">다른 검색어로 시도해보세요.</p></div></div>`; } 
            else { resultsHtml += `<div class="grid grid-cols-1 gap-4">`; results.forEach(item => { const index = item.content.indexOf(query); let snippet = ""; if (index > -1) { const start = Math.max(0, index - 30); const end = Math.min(item.content.length, index + 100); snippet = "..." + item.content.substring(start, end) + "..."; } else { snippet = item.content.substring(0, 100) + "..."; } resultsHtml += `<div class="glass-card p-5 rounded-xl hover:border-blue-500/50 transition cursor-pointer group" onclick="router('${item.id}')"><h3 class="text-lg font-bold text-blue-400 mb-1 group-hover:text-blue-300">${item.title}</h3><p class="text-slate-400 text-sm line-clamp-2">${snippet}</p></div>`; }); resultsHtml += `</div></div>`; }
            mainContent.innerHTML = resultsHtml; mainContent.scrollTop = 0;
        });

        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleSidebar() { 
            const isClosed = sidebar.classList.contains('-translate-x-full'); 
            if (isClosed) { 
                sidebar.classList.remove('-translate-x-full'); 
                overlay.classList.remove('hidden'); 
                document.body.style.overflow = 'hidden';
            } else { 
                closeSidebar(); 
            } 
        }
        function closeSidebar() { 
            sidebar.classList.add('-translate-x-full'); 
            setTimeout(() => { sidebar.classList.add('md:translate-x-0'); }, 50); 
            overlay.classList.add('hidden'); 
            document.body.style.overflow = '';
        }
        menuBtn.addEventListener('click', toggleSidebar); overlay.addEventListener('click', closeSidebar);
        document.addEventListener('DOMContentLoaded', () => { router('home'); });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }
</script>
</body>
</html>
